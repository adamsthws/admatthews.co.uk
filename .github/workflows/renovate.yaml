---
# Runs Renovate bot to automatically check for dependency updates and open
# pull requests when newer versions are available.
name: "Renovate - Auto-update dependencies"

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 1 * *" # First day of every month at midnight

  push:
    branches: ["main"]
    paths:
      - .github/renovate.json

permissions:
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  LOG_LEVEL: "info"
  RENOVATE_AUTODISCOVER: true
  RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
  RENOVATE_PLATFORM: github
  RENOVATE_PLATFORM_COMMIT: enabled
  RENOVATE_BOT_NAME: "bb-17"

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Renovate
        uses: renovatebot/github-action@v46.1.9
        with:
          configurationFile: .github/renovate.json
          token: "${{ steps.app-token.outputs.token }}"
